<div class="dashboard-container">
  <div class="summary-cards">
    <mat-card class="card-modern card-total">
      <div class="card-content">
        <div class="card-info">
          <span class="card-title">Total de Itens</span>
          <span class="card-value">{{ totalItens }}</span>
        </div>
        <mat-icon class="card-bg-icon">inventory_2</mat-icon>
      </div>
    </mat-card>

    <mat-card class="card-modern card-livre">
      <div class="card-content">
        <div class="card-info">
          <span class="card-title">Disponíveis</span>
          <span class="card-value">{{ totalLivre }}</span>
        </div>
        <mat-icon class="card-bg-icon">check_circle</mat-icon>
      </div>
    </mat-card>

    <mat-card class="card-modern card-em-uso">
      <div class="card-content">
        <div class="card-info">
          <span class="card-title">Em Uso</span>
          <span class="card-value">{{ totalEmUso }}</span>
        </div>
        <mat-icon class="card-bg-icon">person</mat-icon>
      </div>
    </mat-card>

    <mat-card class="card-modern card-manutencao">
      <div class="card-content">
        <div class="card-info">
          <span class="card-title">Em Manutenção</span>
          <span class="card-value">{{ totalManutencao }}</span>
        </div>
        <mat-icon class="card-bg-icon">build</mat-icon>
      </div>
    </mat-card>
  </div>

  <div class="main-content-full">
      <app-activity-feed></app-activity-feed>
  </div>
</div>
