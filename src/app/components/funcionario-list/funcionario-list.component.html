<div class="header">
  <h2>Gestão de Funcionários</h2>
  <div class="button-group">
    
    <input type="file" #fileInput (change)="importarExcel($event)" accept=".xlsx, .xls" style="display: none;">

    <button mat-stroked-button color="accent" class="btn-exportar" (click)="fileInput.click()" style="margin-right: 8px; border-radius: 8px;">
      <mat-icon>upload</mat-icon>
      Importar Planilha
    </button>

    <button mat-stroked-button color="accent" class="btn-exportar" (click)="exportarExcel()" style="margin-right: 8px; border-radius: 8px;">
      <mat-icon>download</mat-icon>
      Exportar Planilha
    </button>

    <button mat-flat-button color="primary" class="btn-novo" (click)="openDialog()">
      <mat-icon>add</mat-icon>
      Novo Funcionário
    </button>
  </div>
</div>

<div class="table-container">
  <table mat-table [dataSource]="funcionarios">

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Nome </th>
      <td mat-cell *matCellDef="let func"> 
        <strong class="item-title">{{func.nome}}</strong> 
      </td>
    </ng-container>

    <ng-container matColumnDef="cpf">
      <th mat-header-cell *matHeaderCellDef> CPF </th>
      <td mat-cell *matCellDef="let func" class="text-muted"> 
        {{func.cpf | mask:'000.000.000-00'}} 
      </td>
    </ng-container>

    <ng-container matColumnDef="dataNascimento">
      <th mat-header-cell *matHeaderCellDef> Data de Nascimento </th>
      <td mat-cell *matCellDef="let func" class="text-muted"> 
        {{func.dataNascimento | date:'dd/MM/yyyy'}} 
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef class="actions-header"> Ações </th>
      <td mat-cell *matCellDef="let func" class="actions-cell">
        <button mat-icon-button class="action-btn" (click)="openDialog(func)" title="Editar Funcionário">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button class="action-btn" (click)="deleteFuncionario(func.id)" title="Excluir Funcionário">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover-row"></tr>
  </table>
</div>
