<mat-sidenav-container class="admin-container">
  
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="sidebar-wrapper">
      
      <div class="sidebar-top">
        <div class="logo-container">
          <img src="../../../assets/Elo_TI.png" alt="Elo TI" class="logo">
        </div>

        <mat-nav-list class="nav-menu">
          <a mat-list-item *ngFor="let link of navLinks"
             [routerLink]="link.path"
             routerLinkActive="active-link">
            <mat-icon matListItemIcon>{{link.icon}}</mat-icon>
            <div matListItemTitle>{{link.label}}</div>
          </a>
        </mat-nav-list>
      </div>

      <div class="sidebar-bottom">
        <mat-divider></mat-divider> <mat-nav-list class="nav-menu">
          <a mat-list-item (click)="logout()" class="logout-link">
            <mat-icon matListItemIcon>logout</mat-icon>
            <div matListItemTitle>Sair</div>
          </a>
        </mat-nav-list>
      </div>

    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
